<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Metronome</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; padding-top: 50px; background: #2c3e50; color: white; }
        .metronome { border: none; display: inline-block; padding: 30px; border-radius: 15px; background: #34495e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .bpm-display { font-size: 4rem; font-weight: bold; margin-bottom: 5px; color: #1abc9c; }
        .controls { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        input[type="range"] { width: 250px; cursor: pointer; }
        select { padding: 8px; border-radius: 5px; background: #ecf0f1; border: none; font-size: 1rem; }
        button { padding: 15px 40px; font-size: 1.5rem; cursor: pointer; background: #1abc9c; color: white; border: none; border-radius: 50px; transition: 0.2s; }
        button.playing { background: #e74c3c; }
        .visualizer { display: flex; gap: 10px; margin-top: 20px; justify-content: center; }
        .dot { width: 15px; height: 15px; background: #7f8c8d; border-radius: 50%; transition: 0.1s; }
        .dot.active { background: #1abc9c; transform: scale(1.3); }
    </style>
</head>
<body>

<div class="metronome">
    <div class="bpm-display"><span id="bpmText">120</span></div>
    <div style="margin-bottom: 20px;">BPM</div>
    
    <div class="controls">
        <input type="range" id="tempo" min="40" max="240" value="120">
        
        <div>
            <label>Time Signature: </label>
            <select id="timeSignature">
                <option value="2">2/4</option>
                <option value="3">3/4 (Waltz)</option>
                <option value="4" selected>4/4 (Common)</option>
                <option value="5">5/4</option>
                <option value="6">6/8</option>
            </select>
        </div>

        <button id="playBtn">START</button>
    </div>

    <div class="visualizer" id="visualizer"></div>
</div>

<script>
    const playBtn = document.getElementById('playBtn');
    const tempoSlider = document.getElementById('tempo');
    const bpmText = document.getElementById('bpmText');
    const sigSelect = document.getElementById('timeSignature');
    const visualizer = document.getElementById('visualizer');

    let audioCtx = null;
    let isPlaying = false;
    let nextNoteTime = 0.0;
    let timerID = null;
    let tempo = 120;
    let beatsPerMeasure = 4;
    let currentBeat = 0;

    // Create visual dots
    function updateVisualizer() {
        visualizer.innerHTML = '';
        for (let i = 0; i < beatsPerMeasure; i++) {
            const dot = document.createElement('div');
            dot.classList.add('dot');
            visualizer.appendChild(dot);
        }
    }
    updateVisualizer();

    tempoSlider.addEventListener('input', () => {
        tempo = tempoSlider.value;
        bpmText.textContent = tempo;
    });

    sigSelect.addEventListener('change', () => {
        beatsPerMeasure = parseInt(sigSelect.value);
        currentBeat = 0;
        updateVisualizer();
    });

    function scheduleNote(beatNumber, time) {
        const osc = audioCtx.createOscillator();
        const envelope = audioCtx.createGain();

        // Accent Logic: First beat is higher pitched (1000Hz vs 600Hz)
        osc.frequency.value = (beatNumber === 0) ? 1000 : 600;
        
        envelope.gain.value = 1;
        envelope.gain.exponentialRampToValueAtTime(1, time + 0.001);
        envelope.gain.exponentialRampToValueAtTime(0.001, time + 0.1);

        osc.connect(envelope);
        envelope.connect(audioCtx.destination);

        osc.start(time);
        osc.stop(time + 0.1);

        // Visual feedback
        const dots = document.querySelectorAll('.dot');
        setTimeout(() => {
            dots.forEach(d => d.classList.remove('active'));
            if (dots[beatNumber]) dots[beatNumber].classList.add('active');
        }, (time - audioCtx.currentTime) * 1000);
    }

    function scheduler() {
        while (nextNoteTime < audioCtx.currentTime + 0.1) {
            scheduleNote(currentBeat, nextNoteTime);
            nextNoteTime += 60.0 / tempo;
            currentBeat = (currentBeat + 1) % beatsPerMeasure;
        }
        timerID = setTimeout(scheduler, 25);
    }

    playBtn.addEventListener('click', () => {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        isPlaying = !isPlaying;

        if (isPlaying) {
            currentBeat = 0;
            nextNoteTime = audioCtx.currentTime + 0.05;
            playBtn.textContent = 'STOP';
            playBtn.classList.add('playing');
            scheduler();
        } else {
            playBtn.textContent = 'START';
            playBtn.classList.remove('playing');
            clearTimeout(timerID);
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
        }
    });
</script>
</body>
</html>
